name: release

# Two ways to cut a release:
#  1. Push a SemVer tag:  git tag v1.2.3 && git push origin v1.2.3
#  2. Run this workflow manually (Actions -> release -> Run workflow) and either
#     - type an explicit version (e.g. 1.2.3), or
#     - pick a bump level; "auto" derives the next version from the commits
#       since the last release using Conventional Commits:
#         feat!: / any type! / "BREAKING CHANGE" -> major
#         feat:                                   -> minor
#         everything else (fix:, chore:, docs...) -> patch
# The resolved tag is the single source of truth: it is stamped into the exe
# (-p:Version) and used as the GitHub Release name.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Auto-bump level (ignored if 'version' is set)"
        type: choice
        options: [auto, patch, minor, major]
        default: auto
      version:
        description: "Explicit version without leading v (e.g. 1.2.3). Overrides bump."
        required: false

permissions:
  contents: write   # required to create the GitHub Release + tag

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + tags so auto-bump can inspect commits

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version and tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # tag push: the tag is authoritative
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            EXPLICIT="${{ github.event.inputs.version }}"
            if [ -n "${EXPLICIT}" ]; then
              VERSION="${EXPLICIT#v}"
            else
              LAST="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
              if [ -z "${LAST}" ]; then BASE="0.0.0"; RANGE=""; else BASE="${LAST#v}"; RANGE="${LAST}..HEAD"; fi
              BASE="${BASE%%-*}"; BASE="${BASE%%+*}"   # normalize any prerelease/build metadata
              IFS=. read -r MA MI PA <<< "${BASE}"
              MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
              LEVEL="${{ github.event.inputs.bump }}"
              if [ "${LEVEL}" = "auto" ]; then
                LOG="$(git log --format='%B' ${RANGE})"
                if echo "${LOG}" | grep -qE 'BREAKING CHANGE' || echo "${LOG}" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
                  LEVEL=major
                elif echo "${LOG}" | grep -qE '^feat(\([^)]*\))?:'; then
                  LEVEL=minor
                else
                  LEVEL=patch
                fi
              fi
              case "${LEVEL}" in
                major) MA=$((MA+1)); MI=0; PA=0;;
                minor) MI=$((MI+1)); PA=0;;
                patch) PA=$((PA+1));;
                *) echo "::error::unknown bump level ${LEVEL}"; exit 1;;
              esac
              VERSION="${MA}.${MI}.${PA}"
              echo "Auto-resolved: base=${BASE:-0.0.0} level=${LEVEL} -> ${VERSION}"
            fi
            TAG="v${VERSION}"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "::error::tag ${TAG} already exists — choose a different version"; exit 1
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release version=${VERSION} tag=${TAG}"

      - name: Publish (self-contained win-x64, version-stamped)
        run: >
          dotnet publish kiosk/OLSK60Tester.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "OLSK60Tester-${{ steps.ver.outputs.tag }}-win-x64.zip"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            "OLSK60Tester-${{ steps.ver.outputs.tag }}-win-x64.zip" \
            --target "${GITHUB_SHA}" \
            --title "OLSK60 INPUT LAB ${{ steps.ver.outputs.tag }}" \
            --generate-notes
